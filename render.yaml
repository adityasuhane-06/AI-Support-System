services:
  - type: web
    name: mumzworld-ai-support-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
